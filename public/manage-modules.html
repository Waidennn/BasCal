<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Modules - BasCal</title>
    <link rel="stylesheet" href="flex-calc-design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========================================
           MODERN REETS & LAYOUT
           ======================================== */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--gray-900);
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-box {
            background: var(--gradient-primary);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--gray-600);
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(99, 102, 241, 0.05);
            color: var(--primary);
        }

        .nav-link.active {
            background: var(--gradient-primary);
            color: white;
        }

        /* Mobile Hamburger */
        .mobile-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .mobile-toggle:hover { background: var(--gray-100); }

        .mobile-nav {
            display: none;
            position: fixed;
            top: 75px;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 999;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--gray-200);
        }

        /* Filter Pills Upgrade */
        .filter-section {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .filter-section::-webkit-scrollbar { display: none; }

        .filter-pill {
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filter-pill.active {
            background: var(--gray-900);
            color: white;
            border-color: var(--gray-900);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
        }

        /* Module Card & Buttons */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }

        .module-card {
            background: white;
            border-radius: 28px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
        }

        .module-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card-visual {
            height: 140px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            position: relative;
        }

        .module-id-tag {
            position: absolute;
            bottom: -12px;
            right: 24px;
            background: white;
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid var(--gray-100);
        }

        .btn-action-edit {
            flex: 1;
            padding: 12px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }

        .btn-action-edit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-action-view {
            width: 48px;
            height: 48px;
            background: #f8fafc;
            color: var(--gray-600);
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-action-view:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: white;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-toggle { display: block; }
            .modules-grid { grid-template-columns: 1fr; }
            .mobile-nav.active { display: flex; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="teacher-dashboard.html" class="nav-logo">
                <span class="logo-box">BC</span>
                <span style="font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px;">BasCal</span>
            </a>
            
            <div class="nav-links">
                <a href="teacher-dashboard.html" class="nav-link">Dashboard</a>
                <a href="manage-modules.html" class="nav-link active">Modules</a>
                <a href="analytics-teacher.html" class="nav-link">Analytics</a>
                <button onclick="logout()" style="background: #fee2e2; color: #ef4444; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-left: 12px;">Logout</button>
            </div>

            <div class="mobile-toggle" onclick="toggleMobileNav()">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div id="mobileNav" class="mobile-nav">
        <a href="teacher-dashboard.html" class="nav-link">Dashboard</a>
        <a href="manage-modules.html" class="nav-link active">Modules</a>
        <a href="analytics-teacher.html" class="nav-link">Analytics</a>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
        <button onclick="logout()" style="width: 100%; padding: 14px; border-radius: 12px; background: #fee2e2; color: #ef4444; border: none; font-weight: 700;">Logout</button>
    </div>

    <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 40px 24px;">
        <div style="margin-bottom: 40px;">
            <h1 style="font-size: clamp(28px, 5vw, 36px); font-weight: 900; color: #0f172a; margin-bottom: 8px;">📚 Manage Modules</h1>
            <p style="color: #64748b; font-size: 16px;">Create, edit, and oversee your students' calculus modules.</p>
        </div>

        <div class="filter-section">
            <button class="filter-pill active" onclick="filterModules('all', this)">All Modules</button>
            <button class="filter-pill" onclick="filterModules('conceptual', this)">💡 Conceptual</button>
            <button class="filter-pill" onclick="filterModules('procedural', this)">🔧 Procedural</button>
            <button class="filter-pill" onclick="filterModules('strategic', this)">🎯 Strategic</button>
            <button class="filter-pill" onclick="filterModules('adaptive', this)">🔄 Adaptive</button>
			<button class="filter-pill" onclick="filterModules('productive', this)">🎨 Productive</button>
        </div>

        <div id="modulesList" class="modules-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Loading modules...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://farah-ungroupable-millicent.ngrok-free.dev';
        let allModules = [];

        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            nav.classList.toggle('active');
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || user.role !== 'educator') {
                window.location.href = 'auth.html';
                return false;
            }
            return true;
        }

        async function fetchModules() {
            if (!checkAuth()) return;
            try {
                const response = await fetch(`${API_BASE}/api/educator/modules`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                allModules = data.modules || [];
                renderModules(allModules);
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('modulesList').innerHTML = `<p style="color: red; grid-column: 1/-1; text-align: center;">Failed to connect to server.</p>`;
            }
        }

        function renderModules(modules) {
            const container = document.getElementById('modulesList');
            if (modules.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8;">No modules found in this category.</p>`;
                return;
            }

            container.innerHTML = modules.map(m => {
                // Determine icon if not provided
                const icon = m.icon || (m.category === 'conceptual' ? '💡' : '📐');
                
                return `
                <div class="module-card">
                    <div class="card-visual">
                        ${icon}
                        <div class="module-id-tag">ID: ${m.module_id}</div>
                    </div>
                    <div style="padding: 28px; display: flex; flex-direction: column; flex-grow: 1;">
                        <span style="font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block;">
                            ${m.category || 'General'}
                        </span>
                        <h3 style="font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 12px; line-height: 1.2;">${m.module_name}</h3>
                        <p style="color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 28px;">
                            ${m.description || 'Access and manage the content for this specific module.'}
                        </p>
                        
                        <div style="margin-top: auto; display: flex; gap: 12px;">
                            <button class="btn-action-edit" onclick="location.href='module-editor.html?moduleId=${m.module_id}'">
                                <i class="fas fa-edit"></i> Edit Content
                            </button>
                            <button class="btn-action-view" onclick="location.href='module-view-teacher.html?moduleId=${m.module_id}'" title="Preview Module">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function filterModules(category, btn) {
            // UI Toggle
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');

            if (category === 'all') {
                renderModules(allModules);
            } else {
                const filtered = allModules.filter(m => m.category === category);
                renderModules(filtered);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'auth.html';
        }

        // Run on load
        fetchModules();
    </script>
</body>
</html>
